name: Deploy Flutter Web to GitHub Pages

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches: [ main ] 

# Grants permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        # ⚠️ CRITICAL STEP ⚠️
        # Replace 'your-repo-name' with your exact GitHub repository name!
        # Keep the forward slashes around it.
        run: flutter build web --base-href "/your-repo-name/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
