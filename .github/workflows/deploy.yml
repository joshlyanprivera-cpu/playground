name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ] 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # NEW: Tell all 'run' commands in this job to execute inside your subfolder
    defaults:
      run:
        working-directory: ./flutter/knp_inventory_system

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        # This will now run inside /flutter/knp_inventory_system
        run: flutter pub get

      - name: Build Web
        # ⚠️ Replace 'your-repo-name' with your exact GitHub repository name!
        # This will also run inside /flutter/knp_inventory_system
        run: flutter build web --base-href "/playground/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # NEW: Point this directly to the build folder inside your subfolder
          path: flutter/knp_inventory_system/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


      
